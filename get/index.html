<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get NiPa Player — Download for iOS & Android</title>
  <meta name="description"
    content="Download NiPa Player to watch this content. Available on iOS and Android.">
  <meta name="robots" content="noindex, follow">

  <!-- Open Graph -->
  <meta property="og:title" content="NiPa Player — Watch this on NiPa">
  <meta property="og:description" content="Open this content in NiPa Player on iOS or Android.">
  <meta property="og:type" content="website">
  <meta property="og:image" content="https://www.nipaplayer.com/assets/icon.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../assets/favicon.png">

  <!-- Styles -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap">
  <link rel="stylesheet" href="../styles.css">

  <style>
    .get-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 100px 24px 60px;
      background: var(--gradient-hero);
      position: relative;
      overflow: hidden;
    }

    .get-page::before {
      content: '';
      position: absolute;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      pointer-events: none;
    }

    .get-card {
      position: relative;
      max-width: 520px;
      width: 100%;
      text-align: center;
      background: var(--bg-card);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-lg);
      padding: 48px 32px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .get-icon {
      width: 88px;
      height: 88px;
      border-radius: 22px;
      margin: 0 auto 24px;
      display: block;
      box-shadow: var(--shadow-glow);
    }

    .get-card h1 {
      font-size: clamp(1.75rem, 4vw, 2.25rem);
      margin-bottom: 12px;
      line-height: 1.2;
    }

    .get-card p {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }

    .get-stores {
      display: flex;
      flex-direction: column;
      gap: 14px;
      align-items: center;
    }

    .get-stores .store-badge-link {
      display: inline-block;
      transition: transform var(--transition);
    }

    .get-stores .store-badge-link:hover {
      transform: translateY(-2px);
    }

    .get-redirect {
      margin-top: 28px;
      font-size: 0.875rem;
      color: var(--text-muted);
      min-height: 20px;
    }

    .get-back {
      margin-top: 24px;
      display: inline-block;
      font-size: 0.875rem;
      color: var(--text-muted);
    }

    @media (min-width: 520px) {
      .get-stores {
        flex-direction: row;
        justify-content: center;
      }
    }
  </style>
</head>

<body>

  <div class="get-page">
    <div class="get-card">
      <img src="../assets/icon-128.png" alt="NiPa Player" class="get-icon">
      <h1>Open in <span class="gradient-text">NiPa Player</span></h1>
      <p id="getSubtitle">Download the app to watch this content on your device.</p>

      <div class="get-stores">
        <a id="googlePlayLink" href="https://play.google.com/store/apps/details?id=com.nipaplayer.app" target="_blank"
          rel="noopener" class="store-badge-link">
          <svg width="180" height="54" viewBox="0 0 180 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.5" y="0.5" width="179" height="53" rx="7.5" fill="#000" stroke="#A6A6A6" />
            <text x="60" y="16" fill="#fff" font-family="'Inter',sans-serif" font-size="8" font-weight="400"
              letter-spacing="0.5">GET IT ON</text>
            <text x="60" y="35" fill="#fff" font-family="'Inter',sans-serif" font-size="17" font-weight="600">Google
              Play</text>
            <g transform="translate(14, 9)">
              <defs>
                <linearGradient id="gp1" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#00C3FF" />
                  <stop offset="100%" stop-color="#1B6EF3" />
                </linearGradient>
                <linearGradient id="gp2" x1="0" y1="1" x2="1" y2="0">
                  <stop offset="0%" stop-color="#00F076" />
                  <stop offset="100%" stop-color="#00C3FF" />
                </linearGradient>
                <linearGradient id="gp3" x1="0" y1="0" x2="0" y2="1">
                  <stop offset="0%" stop-color="#FFD400" />
                  <stop offset="100%" stop-color="#FF3B30" />
                </linearGradient>
                <linearGradient id="gp4" x1="1" y1="1" x2="0" y2="0">
                  <stop offset="0%" stop-color="#FF3B30" />
                  <stop offset="100%" stop-color="#FF60A8" />
                </linearGradient>
              </defs>
              <path
                d="M2 2.5C1.4 3.2 1 4.2 1 5.5V30.5C1 31.8 1.4 32.8 2 33.5L2.2 33.7L16.5 19.4V18V18.6L2.2 4.3L2 2.5Z"
                fill="url(#gp1)" />
              <path d="M21.2 24.2L16.5 19.5V18.5L21.2 13.8L21.4 13.9L27 17.1C28.6 18 28.6 19.9 27 20.9L21.4 24.1L21.2 24.2Z"
                fill="url(#gp2)" />
              <path d="M21.4 24.1L16.5 19.2L2 33.5C2.6 34.2 3.6 34.3 4.7 33.6L21.4 24.1Z" fill="url(#gp3)" />
              <path d="M21.4 13.9L4.7 4.4C3.6 3.7 2.6 3.8 2 4.5L16.5 18.8L21.4 13.9Z" fill="url(#gp4)" />
            </g>
          </svg>
        </a>
        <a id="appStoreLink" href="https://apps.apple.com/es/app/nipa-player-iptv-m3u/id6760720773" target="_blank"
          rel="noopener" class="store-badge-link">
          <svg width="180" height="54" viewBox="0 0 180 54" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="0.5" y="0.5" width="179" height="53" rx="7.5" fill="#000" stroke="#A6A6A6" />
            <text x="52" y="16" fill="#fff" font-family="'Inter',sans-serif" font-size="8" font-weight="400"
              letter-spacing="0.3">Download on the</text>
            <text x="52" y="35" fill="#fff" font-family="'Inter',sans-serif" font-size="18" font-weight="600">App
              Store</text>
            <g transform="translate(16, 10)" fill="#fff">
              <path
                d="M22.2 11.7c-.1-2.3 1.9-3.4 2-3.5-1.1-1.6-2.7-1.8-3.3-1.9-1.4-.1-2.8.8-3.5.8-.7 0-1.8-.8-3-.8-1.5 0-2.9.9-3.7 2.3-1.6 2.7-.4 6.8 1.1 9 .8 1.1 1.7 2.3 2.8 2.3 1.2 0 1.6-.7 3-.7s1.8.7 3 .7 2-.9 2.8-2.2c.9-1.3 1.3-2.5 1.3-2.5 0 0-2.4-1-2.5-3.5z" />
              <path
                d="M19.8 4.5c.6-.8 1-1.8.9-2.9-1 0-2.1.6-2.8 1.4-.6.7-1.1 1.8-1 2.9 1 .1 2.1-.6 2.9-1.4z" />
            </g>
          </svg>
        </a>
      </div>

      <div class="get-redirect" id="getRedirect"></div>
      <a href="/" class="get-back">← Back to home</a>
    </div>
  </div>

  <script>
    (function () {
      var APP_STORE_URL = 'https://apps.apple.com/es/app/nipa-player-iptv-m3u/id6760720773';
      var PLAY_STORE_URL = 'https://play.google.com/store/apps/details?id=com.nipaplayer.app';

      var ua = (navigator.userAgent || navigator.vendor || '').toLowerCase();
      var platform = (navigator.platform || '').toLowerCase();
      var isIOS = /iphone|ipad|ipod/.test(ua) ||
        (platform === 'macintel' && navigator.maxTouchPoints > 1);
      var isAndroid = /android/.test(ua);

      var redirectEl = document.getElementById('getRedirect');
      var target = null;

      if (isIOS) {
        target = APP_STORE_URL;
      } else if (isAndroid) {
        target = PLAY_STORE_URL;
      }

      if (target) {
        redirectEl.textContent = 'Redirecting you to the store…';
        window.location.replace(target);
      }
    })();
  </script>

</body>

</html>
